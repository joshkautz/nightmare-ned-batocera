; ============================================================
;  86Box VM config for Nightmare Ned (lean build)
;  Place at:  <86Box data>/Virtual Machines/Nightmare Ned/86box.cfg
;  Machine: ASUS P/I-P55T2P4 (Intel 430HX), Pentium-133, 64 MB.
;  Adjust cdrom_01_image_path to YOUR Nightmare Ned .cue.
;  (86Box regenerates host_cpu/uuid on first run; omitted here.)
; ============================================================
[General]
dpi_scale = 0
start_in_fullscreen = 1
video_fullscreen_scale = 1
vid_renderer = qt_software

[Machine]
cpu_family = pentium_p54c
cpu_multi = 2
cpu_speed = 133333333
cpu_use_dynarec = 1
fpu_type = internal
machine = p55t2p4
mem_size = 65536

[Video]
gfxcard = cl_gd5446

[Input devices]
keyboard_type = keyboard_at
mouse_type = ps2

[Sound]
sndcard = sb16

[Network]
net_01_link = 0

[Hard disks]
hdd_01_fn = win98
hdd_01_ide_channel = 0:0
hdd_01_parameters = 63, 16, 1422, 0, ide
hdd_01_speed = ramdisk

[Floppy and CD-ROM drives]
cdrom_01_ide_channel = 0:1
cdrom_01_image_path = /userdata/nightmarened/Nightmare.Ned.cue
cdrom_01_parameters = 1, atapi
